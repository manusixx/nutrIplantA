# ============================================================
# nutrI-plantA — Sprints 1, 2, 3, 4, 5 y 6
# Stack completo: postgres + minio + gateway + auth + diagnostico
# ============================================================

services:

  postgres:
    image: postgres:16-alpine
    container_name: nutriplanta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/dev/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nutriplanta-net

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: nutriplanta-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - nutriplanta-net

  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    container_name: nutriplanta-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb local/${MINIO_BUCKET_DIAGNOSTICOS} --ignore-existing;
      echo 'Bucket diagnosticos listo';
      exit 0;
      "
    networks:
      - nutriplanta-net

  # ============================================================
  # auth-service
  # ============================================================
  auth-migrations:
    image: nutriplanta-auth-service
    container_name: nutriplanta-auth-migrations
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    command: alembic upgrade head
    networks:
      - nutriplanta-net

  auth-service:
    image: nutriplanta-auth-service
    container_name: nutriplanta-auth
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV}
      LOG_LEVEL: ${LOG_LEVEL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS}
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      auth-migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/auth/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - nutriplanta-net

  # ============================================================
  # diagnostico-service — NUEVO en Sprint 4
  # ============================================================
  diagnostico-migrations:
    build:
      context: ./services/diagnostico-service
      dockerfile: Dockerfile
    container_name: nutriplanta-diagnostico-migrations
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    command: alembic upgrade head
    networks:
      - nutriplanta-net

  diagnostico-service:
    build:
      context: ./services/diagnostico-service
      dockerfile: Dockerfile
    container_name: nutriplanta-diagnostico
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV}
      LOG_LEVEL: ${LOG_LEVEL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      MINIO_HOST: minio
      MINIO_PORT: 9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_DIAGNOSTICOS: ${MINIO_BUCKET_DIAGNOSTICOS}
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      diagnostico-migrations:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/api/v1/diagnostico/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - nutriplanta-net

  # ============================================================
  # API Gateway — actualizado en Sprint 3
  # ============================================================
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: nutriplanta-gateway
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV}
      LOG_LEVEL: ${LOG_LEVEL}
      GATEWAY_HOST: ${GATEWAY_HOST}
      GATEWAY_PORT: ${GATEWAY_PORT}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      AUTH_SERVICE_URL: http://auth-service:8001
      DIAGNOSTICO_SERVICE_URL: http://diagnostico-service:8002
    ports:
      - "${GATEWAY_PORT}:8080"
    depends_on:
      auth-service:
        condition: service_healthy
      diagnostico-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - nutriplanta-net

volumes:
  postgres_data:
    name: nutriplanta-postgres-data
  minio_data:
    name: nutriplanta-minio-data

networks:
  nutriplanta-net:
    name: nutriplanta-net
    driver: bridge
