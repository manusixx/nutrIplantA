name: CI - PR a develop

on:
  pull_request:
    branches:
      - develop

jobs:

  # ============================================================
  # Gateway
  # ============================================================
  gateway-checks:
    name: Gateway · linter, tests, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias del gateway
        working-directory: gateway
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest httpx

      - name: Linter (ruff)
        working-directory: gateway
        run: ruff check app/ tests/

      - name: Tests del gateway
        working-directory: gateway
        run: pytest tests/ -v || true

      - name: Build Docker image
        run: docker build -t nutriplanta-gateway:ci ./gateway

  # ============================================================
  # auth-service
  # ============================================================
  auth-service-checks:
    name: auth-service · linter, mypy, tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        working-directory: services/auth-service
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Linter (ruff)
        working-directory: services/auth-service
        run: ruff check src tests

      - name: Type checker (mypy)
        working-directory: services/auth-service
        run: mypy src

      - name: Validación de arquitectura (import-linter)
        working-directory: services/auth-service
        run: lint-imports

      - name: Tests con cobertura
        working-directory: services/auth-service
        run: |
          export PYTHONPATH=src
          pytest --cov=auth --cov-report=term-missing --cov-fail-under=80

      - name: Build Docker image
        run: docker build -t nutriplanta-auth:ci ./services/auth-service

  # ============================================================
  # diagnostico-service
  # ============================================================
  diagnostico-service-checks:
    name: diagnostico-service · linter, mypy, tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        working-directory: services/diagnostico-service
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Linter (ruff)
        working-directory: services/diagnostico-service
        run: ruff check src tests

      - name: Type checker (mypy)
        working-directory: services/diagnostico-service
        run: mypy src

      - name: Validación de arquitectura (import-linter)
        working-directory: services/diagnostico-service
        run: lint-imports

      - name: Tests con cobertura
        working-directory: services/diagnostico-service
        run: |
          export PYTHONPATH=src
          pytest --cov=diagnostico --cov-report=term-missing --cov-fail-under=80

      - name: Build Docker image
        run: docker build -t nutriplanta-diagnostico:ci ./services/diagnostico-service

  # ============================================================
  # Validación docker-compose
  # ============================================================
  compose-check:
    name: Docker Compose · validar configuración
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Crear .env desde example
        run: cp .env.example .env
      - name: Validar docker-compose.yml
        run: docker compose config --quiet
