name: CI - PR a develop

# ============================================================
# Pipeline que se ejecuta al abrir o actualizar un PR a develop
# ============================================================
# Gates configurados:
#   1. Linter (ruff)
#   2. Type checker (mypy) — desde Sprint 2
#   3. Validación de arquitectura (import-linter) — desde Sprint 2
#   4. Tests con cobertura mínima — desde Sprint 2
#   5. Build de imágenes Docker
# ============================================================

on:
  pull_request:
    branches:
      - develop

jobs:

  # ------------------------------------------------------------
  # Gateway: linter, build, smoke test
  # ------------------------------------------------------------
  gateway-checks:
    name: Gateway · linter y build
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: gateway/requirements.txt

      - name: Instalar dependencias del gateway
        working-directory: gateway
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Linter (ruff)
        working-directory: gateway
        run: ruff check app/

      - name: Build Docker image del gateway
        run: docker build -t nutriplanta-gateway:ci ./gateway

      - name: Smoke test del gateway en contenedor
        run: |
          docker run -d --name gateway-test -p 8080:8080 \
            -e APP_ENV=ci -e LOG_LEVEL=INFO \
            nutriplanta-gateway:ci
          sleep 5
          curl -sf http://localhost:8080/api/v1/health || (docker logs gateway-test && exit 1)
          docker stop gateway-test
          docker rm gateway-test

  # ------------------------------------------------------------
  # Validación del docker-compose
  # ------------------------------------------------------------
  compose-check:
    name: Docker Compose · validar configuración
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Crear .env desde example
        run: cp .env.example .env

      - name: Validar docker-compose.yml
        run: docker compose config --quiet
